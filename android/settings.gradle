pluginManagement {
    def flutterSdkPath = {
        def localPropertiesFile = new File(rootProject.projectDir.parentFile, "local.properties")
        def properties = new Properties()
        
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withReader("UTF-8") { reader -> properties.load(reader) }
        } else if (System.getenv("FLUTTER_ROOT")) {
            properties.setProperty("flutter.sdk", System.getenv("FLUTTER_ROOT"))
        } else {
            throw new RuntimeException("Flutter SDK not found. Set FLUTTER_ROOT or flutter.sdk in local.properties")
        }
        
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        if (flutterSdkPath == null || flutterSdkPath.isEmpty()) {
            throw new RuntimeException("flutter.sdk not set")
        }
        return flutterSdkPath
    }()
    settings.ext.flutterSdkPath = flutterSdkPath

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" apply false
}

include ":app"
